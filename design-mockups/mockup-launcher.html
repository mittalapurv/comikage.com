<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Comikage — Service Launcher (macOS style)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0C0D11; --edge:rgba(255,255,255,.12); --text:#EEF0F4; --mist:#9BA1AD;
    --lime:#C6F32F; --violet:#8B7CF6;
    --disp:"Space Grotesk",sans-serif; --sans:"Inter",-apple-system,sans-serif;
  }
  *{margin:0;box-sizing:border-box}
  body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;display:grid;place-items:center;padding:60px 20px}
  body::before{content:"";position:fixed;inset:0;background:
    radial-gradient(55% 40% at 70% 8%,rgba(139,124,246,.18),transparent 60%),
    radial-gradient(40% 35% at 20% 92%,rgba(198,243,47,.08),transparent 60%);pointer-events:none}

  .stage{position:relative;width:min(980px,100%)}
  .kicker{text-align:center;margin-bottom:26px}
  .kicker .eyebrow{font-family:var(--disp);font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--lime)}
  .kicker h1{font-family:var(--disp);font-weight:700;font-size:clamp(28px,4vw,44px);letter-spacing:-.02em;margin-top:10px}
  .kicker p{color:var(--mist);margin-top:10px;font-size:15px}

  /* ---- launcher panel ---- */
  .launcher{position:relative;border-radius:30px;padding:30px;
    background:rgba(22,23,30,.66);border:1px solid var(--edge);
    backdrop-filter:blur(28px) saturate(1.5);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.14), 0 40px 90px rgba(0,0,0,.55)}

  .searchwrap{display:flex;align-items:center;gap:12px;margin:0 auto 8px;max-width:560px;
    background:rgba(0,0,0,.32);border:1px solid var(--edge);border-radius:16px;padding:0 18px;
    transition:border-color .2s, box-shadow .2s}
  .searchwrap:focus-within{border-color:rgba(198,243,47,.55);box-shadow:0 0 0 4px rgba(198,243,47,.08)}
  .searchwrap svg{flex:none;opacity:.55}
  #q{flex:1;background:none;border:none;outline:none;color:var(--text);font:500 17px var(--sans);padding:16px 0}
  #q::placeholder{color:#6D7280}
  .kbd{flex:none;font:600 11px var(--disp);color:var(--mist);border:1px solid var(--edge);border-radius:6px;padding:3px 7px;opacity:.8}

  .count{ text-align:center;font-size:12px;color:var(--mist);height:26px;padding-top:8px}
  .count b{color:var(--lime);font-weight:600}

  /* ---- grid of app tiles ---- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:6px;margin-top:10px}
  .app{appearance:none;border:none;background:none;color:var(--text);font-family:var(--sans);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:11px;padding:18px 8px 14px;border-radius:20px;
    transition:background .18s, scale .18s, opacity .25s, display .25s allow-discrete}
  .app:hover{background:rgba(255,255,255,.07)}
  .app:focus-visible{outline:2px solid var(--lime);outline-offset:-2px}
  .app:active{scale:.94}
  .app .ico{width:64px;height:64px;border-radius:19px;display:grid;place-items:center;font-size:28px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.35), inset 0 -8px 14px rgba(0,0,0,.22), 0 10px 22px rgba(0,0,0,.45);
    transition:scale .18s cubic-bezier(.34,1.56,.64,1)}
  .app:hover .ico{scale:1.09}
  .app .lbl{font-size:12.5px;font-weight:500;color:#D7DAE1;text-align:center;line-height:1.3}
  .app .lbl mark{background:none;color:var(--lime);border-bottom:1.5px solid var(--lime)}
  /* enter/exit animation for filtering (modern CSS: allow-discrete + @starting-style) */
  .app[hidden]{display:none;opacity:0;scale:.7}
  @starting-style{.app{opacity:0;scale:.7}}

  .empty{display:none;text-align:center;padding:40px 0 30px;color:var(--mist)}
  .empty b{color:var(--text);font-family:var(--disp)}
  .empty button{margin-top:14px;background:none;border:1px solid var(--edge);color:var(--text);border-radius:10px;padding:9px 16px;font:500 13px var(--sans);cursor:pointer}
  .empty button:hover{border-color:var(--lime);color:var(--lime)}
  .grid:has(.app:not([hidden])) + .empty{display:none}
  .grid:not(:has(.app:not([hidden]))) + .empty{display:block}

  /* ---- modal ---- */
  dialog{border:none;padding:0;background:none;max-width:min(560px,92vw);margin:auto}
  dialog::backdrop{background:rgba(5,6,9,.55);backdrop-filter:blur(10px)}
  .sheet{border-radius:28px;padding:34px;background:rgba(24,25,33,.9);border:1px solid var(--edge);
    backdrop-filter:blur(30px) saturate(1.4);color:var(--text);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.16), 0 50px 120px rgba(0,0,0,.6)}
  dialog[open]{animation:sheetIn .32s cubic-bezier(.34,1.4,.64,1)}
  dialog[open]::backdrop{animation:fadeIn .25s ease}
  @keyframes sheetIn{from{opacity:0;translate:0 22px;scale:.96}}
  @keyframes fadeIn{from{opacity:0}}
  .sheet header{display:flex;align-items:center;gap:18px}
  .sheet .ico{width:58px;height:58px;border-radius:17px;display:grid;place-items:center;font-size:26px;flex:none;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.35), 0 10px 22px rgba(0,0,0,.45)}
  .sheet h2{font-family:var(--disp);font-weight:700;font-size:24px;letter-spacing:-.01em}
  .sheet .tag{margin-top:3px;font-size:13px;color:var(--lime)}
  .sheet .body{margin-top:20px;color:#C4C9D4;font-size:15px;line-height:1.75}
  .sheet .body p+p{margin-top:12px}
  .sheet footer{margin-top:26px;display:flex;gap:12px;align-items:center}
  .cta{display:inline-flex;align-items:center;gap:9px;background:var(--lime);color:#0C0D11;padding:12px 20px;
    font:600 14px var(--sans);border:none;border-radius:12px;cursor:pointer;box-shadow:0 0 30px rgba(198,243,47,.22)}
  .cta:hover{transform:translateY(-1px)}
  .close{background:none;border:1px solid var(--edge);color:var(--mist);border-radius:12px;padding:12px 18px;font:500 14px var(--sans);cursor:pointer}
  .close:hover{color:var(--text)}

  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
  }
</style>
</head>
<body>

<div class="stage">
  <div class="kicker">
    <p class="eyebrow">Everything we do, in one place</p>
    <h1>What does your business need?</h1>
    <p>Start typing to filter — click anything to see how we approach it.</p>
  </div>

  <div class="launcher">
    <div class="searchwrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.4-3.4"/></svg>
      <input id="q" type="text" placeholder="Search services… try “web”, “content”, “ai”" autocomplete="off" spellcheck="false" aria-label="Search services">
      <span class="kbd">esc</span>
    </div>
    <p class="count" id="count"></p>
    <div class="grid" id="grid" role="list"></div>
    <div class="empty">
      <p><b>Nothing matches “<span id="qecho"></span>”.</b><br>But if a business needs it, we probably do it.</p>
      <button id="reset">Clear search</button>
    </div>
  </div>
</div>

<dialog id="modal" aria-labelledby="m-title">
  <article class="sheet">
    <header>
      <span class="ico" id="m-ico"></span>
      <div>
        <h2 id="m-title"></h2>
        <p class="tag" id="m-tag"></p>
      </div>
    </header>
    <div class="body" id="m-body"></div>
    <footer>
      <button class="cta" id="m-cta">Discuss this with us →</button>
      <button class="close" id="m-close">Close</button>
    </footer>
  </article>
</dialog>

<script>
const SERVICES = [
  { id:"web-design", label:"Web Design", icon:"🎨", grad:"linear-gradient(135deg,#37B6FF,#1F6FEB)",
    tag:"Design that positions, not decorates",
    keywords:["website","ui","layout","landing","design"],
    body:[
      "We design around your customer's decision, not around trends. Every page answers: who is this for, what should they feel, and what should they do next.",
      "You get a design system — type, colour, components — so the site stays coherent as it grows, instead of drifting page by page."
    ]},
  { id:"business-websites", label:"Business Websites", icon:"🌐", grad:"linear-gradient(135deg,#4ADE80,#15803D)",
    tag:"Credibility that generates enquiries",
    keywords:["site","company","corporate","landing","pages"],
    body:[
      "A professional website that communicates clearly, establishes credibility, and turns visitors into enquiries — built after we understand your business, not before.",
      "Includes structure, messaging, responsive build, deployment, and the boring-but-critical details: analytics, SEO basics, business email."
    ]},
  { id:"seo", label:"SEO", icon:"🔍", grad:"linear-gradient(135deg,#FBBF24,#D97706)",
    tag:"Be found for what you actually sell",
    keywords:["search","google","ranking","traffic","keywords"],
    body:[
      "We start with the searches your customers actually make — in your city, in your industry, in their words — and structure your pages to answer them.",
      "Technical hygiene (speed, sitemaps, metadata) plus content that earns rankings. No black-hat tricks, no vanity keyword reports."
    ]},
  { id:"content", label:"Content Creation", icon:"✍️", grad:"linear-gradient(135deg,#F472B6,#BE185D)",
    tag:"Your business, expressed clearly",
    keywords:["copy","writing","blog","messaging","words"],
    body:[
      "Most business owners know their business deeply but struggle to put it into words. That's the actual job: we sit with you, understand how you create value, and express it in language your customers recognise themselves in.",
      "Service pages, founder stories, case studies, proposals — written from your business knowledge, shaped by us. You review, we refine."
    ]},
  { id:"graphics", label:"Website Graphics", icon:"🖼️", grad:"linear-gradient(135deg,#A78BFA,#6D28D9)",
    tag:"Visuals with a reason to exist",
    keywords:["illustration","icons","images","banners","visual"],
    body:[
      "Custom illustrations, diagrams, and imagery that explain your business — not stock photos of handshakes.",
      "Where a picture can replace three paragraphs, we make the picture: process diagrams, product visuals, service icons, social banners."
    ]},
  { id:"business-email", label:"Business Emails", icon:"✉️", grad:"linear-gradient(135deg,#38BDF8,#0369A1)",
    tag:"you@yourcompany.com, done right",
    keywords:["gmail","workspace","domain","mail","professional"],
    body:[
      "Sending quotations from a personal Gmail costs trust. We set up email on your own domain — Google Workspace or Zoho — with the records that keep you out of spam folders (SPF, DKIM, DMARC).",
      "Includes signatures, shared inboxes like sales@ and support@, and migration of old mail if needed."
    ]},
  { id:"web-apps", label:"Business Applications", icon:"▦", grad:"linear-gradient(135deg,#B18CFF,#6A4DE0)",
    tag:"For work that outgrew spreadsheets",
    keywords:["app","crm","portal","internal","tool","software"],
    body:[
      "Dashboards, client portals, CRM-style systems, approval workflows — focused tools that fix a specific operational bottleneck.",
      "We map the actual workflow first: who uses it, what they decide, what data matters. Then we build in phases, so you never pay for software you don't use."
    ]},
  { id:"dashboards", label:"Dashboards", icon:"📊", grad:"linear-gradient(135deg,#34D399,#047857)",
    tag:"Your business at a glance",
    keywords:["reports","analytics","kpi","metrics","data"],
    body:[
      "When reports take days to prepare, decisions wait. We build dashboards that pull your operations into one live view — orders, projects, payments, pipelines.",
      "Built on your existing data wherever it lives: spreadsheets, Tally, your app's database."
    ]},
  { id:"workflows", label:"Approvals & Workflows", icon:"✅", grad:"linear-gradient(135deg,#FB923C,#C2410C)",
    tag:"From phone-call approvals to a clear queue",
    keywords:["process","automation","status","tracking","operations"],
    body:[
      "Approvals that happen over phone calls and WhatsApp leave no trail and stall when one person is busy. We turn them into request → review → release flows with visible status.",
      "Everyone knows what's pending, with whom, and since when. That alone changes how a business runs."
    ]},
  { id:"ai-assistants", label:"AI Assistants", icon:"✦", grad:"linear-gradient(135deg,#C6F32F,#7BB61A)",
    tag:"Practical AI, not gimmicks",
    keywords:["chatbot","gpt","assistant","knowledge","llm","ai"],
    body:[
      "Internal assistants that answer from your documents, price lists, and SOPs — so your team stops re-asking the same three people the same questions.",
      "We begin with the use case, not the tool: what's repeatedly searched, what's repetitive, where human review must stay."
    ]},
  { id:"automation", label:"Automation", icon:"⚡", grad:"linear-gradient(135deg,#F87171,#B91C1C)",
    tag:"Kill the repetitive work",
    keywords:["workflow","integration","zapier","scripts","repetitive","ai"],
    body:[
      "Data re-entered in three places, reports assembled by hand, documents renamed one by one — we automate the work nobody should be doing.",
      "Quiet, reliable automations with clear boundaries and a human in the loop where judgment matters."
    ]},
  { id:"whatsapp", label:"WhatsApp Integration", icon:"💬", grad:"linear-gradient(135deg,#4ADE80,#166534)",
    tag:"Meet customers where they already are",
    keywords:["chat","messaging","business api","leads","india"],
    body:[
      "Your customers live on WhatsApp — your website should hand off to it cleanly. Click-to-chat, structured enquiries, order updates via the Business API.",
      "We keep the habit your customers already have, but structure the data so nothing gets lost in a chat scroll."
    ]},
  { id:"analytics", label:"Analytics Setup", icon:"📈", grad:"linear-gradient(135deg,#60A5FA,#1D4ED8)",
    tag:"Know what's working",
    keywords:["ga4","tracking","conversion","measurement","data"],
    body:[
      "Which pages bring enquiries? Which ads waste money? We set up GA4 and conversion tracking that answers real questions, and a simple monthly view you'll actually read.",
      "No drowning in dashboards — three numbers that matter beat thirty that don't."
    ]},
  { id:"hosting", label:"Hosting & Domains", icon:"🗄️", grad:"linear-gradient(135deg,#94A3B8,#475569)",
    tag:"The plumbing, handled",
    keywords:["server","deploy","domain","dns","ssl","maintenance"],
    body:[
      "Domains, DNS, SSL, deployment, backups, uptime — the plumbing every business site needs and no business owner should think about.",
      "We set it up properly and can keep maintaining it, so your site stays fast, secure, and yours."
    ]}
];

const grid = document.getElementById("grid");
const q = document.getElementById("q");
const count = document.getElementById("count");
const qecho = document.getElementById("qecho");
const modal = document.getElementById("modal");

// build tiles
for (const s of SERVICES) {
  const b = document.createElement("button");
  b.className = "app"; b.type = "button"; b.setAttribute("role","listitem");
  b.dataset.id = s.id;
  b.dataset.hay = (s.label + " " + s.keywords.join(" ")).toLowerCase();
  b.innerHTML = `<span class="ico" style="background:${s.grad}">${s.icon}</span><span class="lbl">${s.label}</span>`;
  b.addEventListener("click", () => openModal(s));
  grid.appendChild(b);
}

function filter() {
  const needle = q.value.trim().toLowerCase();
  let shown = 0;
  for (const tile of grid.children) {
    const hit = !needle || tile.dataset.hay.includes(needle);
    tile.hidden = !hit;
    if (hit) { shown++; highlight(tile, needle); }
  }
  qecho.textContent = q.value.trim();
  count.innerHTML = needle
    ? (shown ? `<b>${shown}</b> of ${SERVICES.length} services match` : "")
    : `${SERVICES.length} services — and counting`;
}

function highlight(tile, needle) {
  const s = SERVICES.find(x => x.id === tile.dataset.id);
  const lbl = tile.querySelector(".lbl");
  if (!needle) { lbl.innerHTML = s.label; return; }
  const i = s.label.toLowerCase().indexOf(needle);
  lbl.innerHTML = i < 0 ? s.label
    : s.label.slice(0,i) + "<mark>" + s.label.slice(i, i+needle.length) + "</mark>" + s.label.slice(i+needle.length);
}

function openModal(s) {
  document.getElementById("m-ico").style.background = s.grad;
  document.getElementById("m-ico").textContent = s.icon;
  document.getElementById("m-title").textContent = s.label;
  document.getElementById("m-tag").textContent = s.tag;
  document.getElementById("m-body").innerHTML = s.body.map(p => `<p>${p}</p>`).join("");
  document.getElementById("m-cta").onclick = () => { modal.close(); alert("→ In the real site this scrolls to the contact form, pre-filled with “" + s.label + "”."); };
  modal.showModal();
}

q.addEventListener("input", filter);
document.getElementById("reset").addEventListener("click", () => { q.value = ""; filter(); q.focus(); });
document.getElementById("m-close").addEventListener("click", () => modal.close());
modal.addEventListener("click", e => { if (e.target === modal) modal.close(); }); // click backdrop closes

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && !modal.open && q.value) { q.value = ""; filter(); }
  // type anywhere -> focus search (like Spotlight)
  if (!modal.open && document.activeElement !== q && e.key.length === 1 && !e.metaKey && !e.ctrlKey && !e.altKey) q.focus();
  // Enter in search opens the first visible tile
  if (e.key === "Enter" && document.activeElement === q) {
    const first = grid.querySelector(".app:not([hidden])");
    if (first) first.click();
  }
});

filter();
</script>
</body>
</html>
