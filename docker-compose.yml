name: letscrud

services:
  app:
    container_name: letscrud-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      GMAIL_USER: ${GMAIL_USER:-a29npvtltd@gmail.com}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:-a29npvtltd@gmail.com}
    ports:
      - "127.0.0.1:3010:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - letscrud-internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    container_name: letscrud-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - letscrud-pgdata:/var/lib/postgresql/data
    networks:
      - letscrud-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  letscrud-internal:
    name: letscrud-internal
    driver: bridge

volumes:
  letscrud-pgdata:
    name: letscrud-pgdata
